name: Metrics
on:
  # Schedule updates (every 12 hours)
  schedule: [{cron: "0 */12 * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          # Note: Using a Personal Access Token (PAT) with `repo` and `read:user` scopes 
          # is highly recommended to display private stats and avoid rate limits.
          # Create one at https://github.com/settings/tokens and add it as METRICS_TOKEN in secrets.
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}

          # Options
          user: thdat-vu
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Ho_Chi_Minh
          repositories_forks: yes
          
          # Appearance
          theme: tokyonight
          
          # Output
          filename: github-metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: update metrics [skip ci]"
          
          # Languages plugin
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
